heroAccent }}<\u002Fspan><\u002Fh1>\n          <p style=\"margin:0 0 18px;font-size:19px;line-height:1.6;color:#C3C9E0;max-width:640px\">{{ heroSub }}<\u002Fp>\n          <p style=\"margin:0 0 38px;font-size:17px;line-height:1.6;color:#9AA3C4;max-width:600px\">As an HTX scholar you build deep expertise, experience the world beyond your studies, and begin a career where your work has clear purpose.<\u002Fp>\n          <div style=\"display:flex;flex-wrap:wrap;gap:14px\">\n            <button sc-camel-on-click=\"{{ goWork }}\" style=\"display:inline-flex;align-items:center;gap:9px;padding:15px 28px;border-radius:999px;border:none;cursor:pointer;background:var(--htx-grad,linear-gradient(135deg,#7C3AED,#22D3EE));color:#fff;font-family:'Space Grotesk';font-weight:600;font-size:15.5px;box-shadow:0 12px 30px -10px rgba(124,58,237,.75)\">Explore the Work →<\u002Fbutton>\n            <button sc-camel-on-click=\"{{ goExp }}\" style=\"display:inline-flex;align-items:center;gap:9px;padding:15px 28px;border-radius:999px;cursor:pointer;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.18);color:#EAECF5;font-family:'Space Grotesk';font-weight:600;font-size:15.5px\">Discover the Scholar Experience<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:56px;max-width:760px\">\n          <div style=\"position:relative;border-radius:20px;overflow:hidden;border:1px solid rgba(255,255,255,.12);background:#04060F;aspect-ratio:16/9;box-shadow:0 30px 70px -30px rgba(124,58,237,.55)\">\n            <sc-if value=\"{{ heroVideo.isPlaying }}\" hint-placeholder-val=\"{{ false }}\">\n              <iframe src=\"{{ heroVideo.embed }}\" title=\"Inside HTX\" style=\"position:absolute;inset:0;width:100%;height:100%;border:0\" allow=\"autoplay; encrypted-media; picture-in-picture\" allowfullscreen=\"\"><\u002Fiframe>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ heroVideo.showChrome }}\" hint-placeholder-val=\"{{ true }}\">\n              <button sc-camel-on-click=\"{{ heroVideo.play }}\" style=\"position:absolute;inset:0;border:none;cursor:pointer;padding:0;overflow:hidden;background:#04060F\">\n                {{ heroVideo.thumbImg }}\n                <span style=\"position:absolute;inset:0;background:linear-gradient(0deg,rgba(6,9,23,.72),transparent 58%)\"><\u002Fspan>\n                <span style=\"position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:66px;height:66px;border-radius:50%;background:var(--htx-grad,linear-gradient(135deg,#7C3AED,#22D3EE));display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;box-shadow:0 12px 30px -8px rgba(124,58,237,.85)\">▶<\u002Fspan>\n                <span style=\"position:absolute;left:24px;bottom:22px;text-align:left\">\n                  <span style=\"display:block;font-family:'Space Grotesk';font-weight:600;font-size:18px;color:#fff\">See HTX in the real world<\u002Fspan>\n                  <span style=\"display:block;font-size:13px;color:#C3C9E0;margin-top:2px\">2 min · science &amp; technology at the frontline<\u002Fspan>\n                <\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- FOUR REASONS -->\n    <section style=\"padding:96px 5vw;background:#080C1E\">\n      <div style=\"max-width:1200px;margin:0 auto\">\n        <div style=\"display:flex;align-items:flex-end;justify-content:space-between;gap:24px;flex-wrap:wrap;margin-bottom:48px\">\n          <div>\n            <div style=\"font-size:12px;letter-spacing:2.5px;color:#8B5CF6;margin-bottom:12px\">WHY CHOOSE HTX<\u002Fdiv>\n            <h2 style=\"margin:0;font-family:'Space Grotesk';font-weight:700;font-size:clamp(28px,4vw,44px);line-height:1.08;letter-spacing:-.8px;color:#fff;max-width:520px\">Four reasons scholars choose the frontline<\u002Fh2>\n          <\u002Fdiv>\n          <p style=\"margin:0;max-width:360px;font-size:15px;line-height:1.6;color:#9AA3C4\">More than a scholarship — a developmental journey from classroom to real-world impact.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(255px,1fr));gap:20px\">\n          <sc-for list=\"{{ reasons }}\" as=\"r\" hint-placeholder-count=\"4\">\n            <div style=\"position:relative;padding:30px 28px 34px;border-radius:18px;background:linear-gradient(160deg,rgba(124,58,237,.10),rgba(34,211,238,.04));border:1px solid rgba(255,255,255,.10);overflow:hidden\">\n              <div aria-hidden=\"true\" style=\"position:absolute;right:-10px;bottom:-30px;font-family:'Space Grotesk';font-weight:700;font-size:120px;color:rgba(255,255,255,.035);line-height:1\">{{ r.num }}<\u002Fdiv>\n              <div style=\"position:relative\">\n                <div style=\"width:46px;height:46px;border-radius:12px;background:{{ r.chip }};display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk';font-weight:700;color:#fff;font-size:20px;margin-bottom:20px\">{{ r.icon }}<\u002Fdiv>\n                <h3 style=\"margin:0 0 10px;font-family:'Space Grotesk';font-weight:600;font-size:20px;color:#fff\">{{ r.title }}<\u002Fh3>\n                <p style=\"margin:0;font-size:14.5px;line-height:1.6;color:#A8AFCC\">{{ r.body }}<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- CLOSING -->\n    <section style=\"position:relative;overflow:hidden;padding:110px 5vw;text-align:center\">\n      <div style=\"position:absolute;inset:0;background:radial-gradient(80% 120% at 50% 0%,rgba(124,58,237,.25),transparent 60%),#060917\"><\u002Fdiv>\n      <div style=\"position:relative;max-width:820px;margin:0 auto\">\n        <h2 style=\"margin:0 0 30px;font-family:'Space Grotesk';font-weight:700;font-size:clamp(30px,4.5vw,52px);line-height:1.1;letter-spacing:-1px;color:#fff\">More than a scholarship.<br>A journey from <span style=\"background:var(--htx-head,linear-gradient(120deg,#A78BFA,#22D3EE));-webkit-background-clip:text;background-clip:text;color:transparent\">classroom to frontline.<\u002Fspan><\u002Fh2>\n        <button sc-camel-on-click=\"{{ goWork }}\" style=\"display:inline-flex;align-items:center;gap:9px;padding:15px 30px;border-radius:999px;border:none;cursor:pointer;background:var(--htx-grad,linear-gradient(135deg,#7C3AED,#22D3EE));color:#fff;font-family:'Space Grotesk';font-weight:600;font-size:15.5px;box-shadow:0 12px 30px -10px rgba(124,58,237,.75)\">Find your place at HTX →<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ isWork }}\" hint-placeholder-val=\"{{ true }}\">\n  <div>\n    <!-- OPENING -->\n    <section style=\"position:relative;overflow:hidden;padding:104px 5vw 72px\">\n      <div style=\"position:absolute;inset:0;background:radial-gradient(100% 90% at 20% 0%,rgba(34,211,238,.16),transparent 55%),#060917\"><\u002Fdiv>\n      <div style=\"position:relative;max-width:1200px;margin:0 auto\">\n        <div style=\"font-size:12px;letter-spacing:2.5px;color:#22D3EE;margin-bottom:14px\">WORK &amp; CAREERS<\u002Fdiv>\n        <h1 style=\"margin:0 0 26px;font-family:'Space Grotesk';font-weight:700;font-size:clamp(36px,5.5vw,64px);line-height:1.04;letter-spacing:-1.3px;color:#fff;max-width:820px\">Find your place at HTX<\u002Fh1>\n        <p style=\"margin:0;font-size:18px;line-height:1.65;color:#B4BAD6;max-width:680px\">You may be drawn to AI, chemistry, robotics, cybersecurity or engineering. At HTX these aren't isolated disciplines — they come together to solve operational challenges that are complex, urgent and unprecedented. Explore where your interests could take you.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- CHOOSE YOUR X -->\n    <section style=\"padding:36px 5vw 96px;background:#060917\">\n      <div style=\"max-width:1200px;margin:0 auto\">\n        <h2 style=\"margin:0 0 8px;font-family:'Space Grotesk';font-weight:700;font-size:clamp(26px,3.6vw,38px);letter-spacing:-.6px;color:#fff\">Choose your <span style=\"color:#8B5CF6\">X<\u002Fspan><\u002Fh2>\n        <p style=\"margin:0 0 32px;font-size:15px;color:#9AA3C4\">Pick a mission to see the technology behind it — and the fields that lead there.<\u002Fp>\n        <div style=\"display:flex;flex-wrap:wrap;gap:10px;margin-bottom:32px\">\n          <sc-for list=\"{{ missionTabs }}\" as=\"m\" hint-placeholder-count=\"5\">\n            <button sc-camel-on-click=\"{{ m.go }}\" style=\"{{ m.style }}\">{{ m.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1.1fr .9fr;gap:0;border-radius:22px;overflow:hidden;border:1px solid rgba(255,255,255,.10);background:linear-gradient(150deg,rgba(124,58,237,.12),rgba(34,211,238,.05))\">\n          <div style=\"padding:46px 44px\">\n            <div style=\"font-size:12px;letter-spacing:2px;color:#8B5CF6;margin-bottom:16px\">{{ activeMission.tag }}<\u002Fdiv>\n            <h3 style=\"margin:0 0 18px;font-family:'Space Grotesk';font-weight:700;font-size:34px;line-height:1.08;color:#fff\">{{ activeMission.title }}<\u002Fh3>\n            <p style=\"margin:0 0 30px;font-size:16px;line-height:1.65;color:#B4BAD6;max-width:460px\">{{ activeMission.body }}<\u002Fp>\n            <div style=\"font-size:12px;letter-spacing:1.5px;color:#6B7399;margin-bottom:12px\">POSSIBLE FIELDS<\u002Fdiv>\n            <div style=\"display:flex;flex-wrap:wrap;gap:9px\">\n              <sc-for list=\"{{ activeMission.fields }}\" as=\"f\" hint-placeholder-count=\"5\">\n                <span style=\"padding:8px 15px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);font-size:13.5px;color:#EAECF5\">{{ f }}<\u002Fspan>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"position:relative;min-height:340px;background:#04060F\">\n            <image-slot id=\"work-mission\" shape=\"rect\" placeholder=\"Mission footage — officers using HTX technology in the field\"><\u002Fimage-slot>\n            <div style=\"position:absolute;inset:0;background:linear-gradient(90deg,rgba(6,9,23,.85),transparent 45%);pointer-events:none\"><\u002Fdiv>\n            <div aria-hidden=\"true\" style=\"position:absolute;right:24px;bottom:14px;font-family:'Space Grotesk';font-weight:700;font-size:150px;line-height:.8;color:transparent;-webkit-text-stroke:1.5px rgba(255,255,255,.14);pointer-events:none\">X<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- IDEA TO IMPACT -->\n    <section style=\"padding:96px 5vw;background:#080C1E\">\n      <div style=\"max-width:1200px;margin:0 auto\">\n        <div style=\"font-size:12px;letter-spacing:2.5px;color:#22D3EE;margin-bottom:12px\">FROM IDEA TO OPERATIONAL IMPACT<\u002Fdiv>\n        <h2 style=\"margin:0 0 48px;font-family:'Space Grotesk';font-weight:700;font-size:clamp(26px,3.8vw,42px);letter-spacing:-.7px;color:#fff;max-width:640px\">See the full journey — from a frontline need to a deployed capability<\u002Fh2>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:0\">\n          <sc-for list=\"{{ pipeline }}\" as=\"s\" hint-placeholder-count=\"4\">\n            <div style=\"position:relative;padding:0 22px 0 0\">\n              <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:20px\">\n                <div style=\"flex:none;width:44px;height:44px;border-radius:12px;background:var(--htx-grad,linear-gradient(135deg,#7C3AED,#22D3EE));display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk';font-weight:700;color:#fff;font-size:17px\">{{ s.n }}<\u002Fdiv>\n                <div style=\"flex:1;height:2px;background:linear-gradient(90deg,rgba(124,58,237,.5),rgba(34,211,238,.1))\"><\u002Fdiv>\n              <\u002Fdiv>\n              <h3 style=\"margin:0 0 10px;font-family:'Space Grotesk';font-weight:600;font-size:19px;color:#fff\">{{ s.title }}<\u002Fh3>\n              <p style=\"margin:0;font-size:14px;line-height:1.6;color:#A8AFCC;padding-right:14px\">{{ s.body }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- CAREER POSSIBILITIES -->\n    <section style=\"padding:96px 5vw;background:#060917\">\n      <div style=\"max-width:1200px;margin:0 auto\">\n        <div style=\"font-size:12px;letter-spacing:2.5px;color:#8B5CF6;margin-bottom:12px\">CAREER POSSIBILITIES<\u002Fdiv>\n        <h2 style=\"margin:0 0 44px;font-family:'Space Grotesk';font-weight:700;font-size:clamp(26px,3.8vw,42px);letter-spacing:-.7px;color:#fff;max-width:640px\">Grow deep, grow broad, or grow into leadership<\u002Fh2>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px\">\n          <sc-for list=\"{{ careers }}\" as=\"c\" hint-placeholder-count=\"3\">\n            <div style=\"padding:32px 30px;border-radius:18px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.10)\">\n              <div style=\"font-family:'Space Grotesk';font-weight:700;font-size:15px;color:#22D3EE;margin-bottom:16px\">{{ c.step }}<\u002Fdiv>\n              <h3 style=\"margin:0 0 12px;font-family:'Space Grotesk';font-weight:600;font-size:21px;color:#fff\">{{ c.title }}<\u002Fh3>\n              <p style=\"margin:0;font-size:14.5px;line-height:1.6;color:#A8AFCC\">{{ c.body }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- CLOSING -->\n    <section style=\"position:relative;overflow:hidden;padding:104px 5vw;text-align:center\">\n      <div style=\"position:absolute;inset:0;background:radial-gradient(80% 120% at 50% 0%,rgba(34,211,238,.20),transparent 60%),#060917\"><\u002Fdiv>\n      <div style=\"position:relative;max-width:800px;margin:0 auto\">\n        <h2 style=\"margin:0 0 22px;font-family:'Space Grotesk';font-weight:700;font-size:clamp(28px,4.2vw,48px);line-height:1.1;letter-spacing:-1px;color:#fff\">Your degree is the starting point, not the boundary<\u002Fh2>\n        <p style=\"margin:0 0 36px;font-size:17px;line-height:1.6;color:#B4BAD6\">The most important public-safety challenges rarely sit within one discipline. At HTX you'll learn to work across science, technology, operations and people to solve the whole problem.<\u002Fp>\n        <button sc-camel-on-click=\"{{ goExp }}\" style=\"display:inline-flex;align-items:center;gap:9px;padding:15px 30px;border-radius:999px;border:none;cursor:pointer;background:var(--htx-grad,linear-gradient(135deg,#7C3AED,#22D3EE));color:#fff;font-family:'Space Grotesk';font-weight:600;font-size:15.5px;box-shadow:0 12px 30px -10px rgba(124,58,237,.75)\">See the HTX Scholar Experience →<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n  <sc-if value=\"{{ isExp }}\" hint-placeholder-val=\"{{ true }}\">\n  <div>\n    <!-- HEADLINE -->\n    <section style=\"position:relative;overflow:hidden;padding:110px 5vw 76px\">\n      <div style=\"position:absolute;inset:0;background:radial-gradient(110% 90% at 80% 0%,rgba(124,58,237,.24),transparent 55%),#060917\"><\u002Fdiv>\n      <div aria-hidden=\"true\" style=\"position:absolute;display:var(--htx-x-display,block);left:-3vw;bottom:-90px;font-family:'Space Grotesk';font-weight:700;font-size:min(38vw,540px);line-height:.8;color:transparent;-webkit-text-stroke:1.5px rgba(34,211,238,.12);pointer-events:none\">X<\u002Fdiv>\n      <div style=\"position:relative;max-width:1200px;margin:0 auto\">\n        <div style=\"font-size:12px;letter-spacing:2.5px;color:#8B5CF6;margin-bottom:14px\">SCHOLAR EXPERIENCE<\u002Fdiv>\n        <h1 style=\"margin:0 0 28px;font-family:'Space Grotesk';font-weight:700;font-size:clamp(34px,5vw,60px);line-height:1.05;letter-spacing:-1.3px;color:#fff;max-width:840px\">Supported at every stage.<br>Challenged to <span style=\"background:var(--htx-head,linear-gradient(120deg,#A78BFA,#22D3EE));-webkit-background-clip:text;background-clip:text;color:transparent\">experience more.<\u002Fspan><\u002Fh1>\n        <p style=\"margin:0 0 34px;font-size:17px;line-height:1.65;color:#B4BAD6;max-width:680px\">Strong professionals are shaped by more than academic achievement. They grow through new environments, real-world experiences, trusted relationships and chances to test what they know.<\u002Fp>\n        <div style=\"display:flex;flex-wrap:wrap;gap:16px\">\n          <div style=\"flex:1;min-width:280px;padding:24px 26px;border-radius:16px;background:rgba(124,58,237,.10);border:1px solid rgba(124,58,237,.30)\">\n            <div style=\"font-family:'Space Grotesk';font-weight:600;font-size:17px;color:#fff;line-height:1.4\">We will support you throughout your journey.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:1;min-width:280px;padding:24px 26px;border-radius:16px;background:rgba(34,211,238,.08);border:1px solid rgba(34,211,238,.28)\">\n            <div style=\"font-family:'Space Grotesk';font-weight:600;font-size:17px;color:#fff;line-height:1.4\">We will encourage you to experience the world beyond the classroom.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- THREE LAYERS OF SUPPORT -->\n    <section style=\"padding:88px 5vw;background:#080C1E\">\n      <div style=\"max-width:1200px;margin:0 auto\">\n        <div style=\"font-size:12px;letter-spacing:2.5px;color:#22D3EE;margin-bottom:12px\">THREE LAYERS OF SUPPORT<\u002Fdiv>\n        <h2 style=\"margin:0 0 36px;font-family:'Space Grotesk';font-weight:700;font-size:clamp(26px,3.8vw,42px);letter-spacing:-.7px;color:#fff;max-width:560px\">Three roles. One person supported — you.<\u002Fh2>\n        <div style=\"display:grid;grid-template-columns:320px 1fr;gap:28px;align-items:start\">\n          <div style=\"display:flex;flex-direction:column;gap:12px\">\n            <sc-for list=\"{{ supportTabs }}\" as=\"s\" hint-placeholder-count=\"3\">\n              <button sc-camel-on-click=\"{{ s.go }}\" style=\"{{ s.style }}\">\n                <span style=\"display:block;font-family:'Space Grotesk';font-weight:700;font-size:17px;margin-bottom:3px\">{{ s.role }}<\u002Fspan>\n                <span style=\"display:block;font-size:13px;opacity:.8\">{{ s.value }}<\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"padding:40px 40px 44px;border-radius:20px;background:linear-gradient(155deg,rgba(124,58,237,.12),rgba(34,211,238,.04));border:1px solid rgba(255,255,255,.10)\">\n            <div style=\"font-size:12px;letter-spacing:2px;color:#8B5CF6;margin-bottom:12px\">{{ activeSupport.role }}<\u002Fdiv>\n            <h3 style=\"margin:0 0 16px;font-family:'Space Grotesk';font-weight:700;font-size:27px;color:#fff\">{{ activeSupport.head }}<\u002Fh3>\n            <p style=\"margin:0 0 26px;font-size:16px;line-height:1.65;color:#B4BAD6;max-width:600px\">{{ activeSupport.body }}<\u002Fp>\n            <div style=\"font-size:12px;letter-spacing:1.5px;color:#6B7399;margin-bottom:14px\">{{ activeSupport.listLabel }}<\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:10px\">\n              <sc-for list=\"{{ activeSupport.items }}\" as=\"it\" hint-placeholder-count=\"5\">\n                <div style=\"display:flex;gap:11px;align-items:flex-start;font-size:14.5px;line-height:1.5;color:#D3D8EC\">\n                  <span style=\"flex:none;color:#22D3EE;margin-top:1px\">✕<\u002Fspan><span>{{ it }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- BEYOND THE CLASSROOM -->\n    <section style=\"padding:96px 5vw;background:#060917\">\n      <div style=\"max-width:1200px;margin:0 auto\">\n        <div style=\"font-size:12px;letter-spacing:2.5px;color:#8B5CF6;margin-bottom:12px\">EXPERIENCE BEYOND THE CLASSROOM<\u002Fdiv>\n        <h2 style=\"margin:0 0 16px;font-family:'Space Grotesk';font-weight:700;font-size:clamp(26px,3.8vw,42px);letter-spacing:-.7px;color:#fff;max-width:640px\">Learn from the world, not only from textbooks<\u002Fh2>\n        <p style=\"margin:0 0 44px;font-size:16px;line-height:1.6;color:#9AA3C4;max-width:620px\">Scholars are <em style=\"color:#C4B5FD;font-style:normal\">encouraged and supported<\u002Fem> to broaden their perspectives through relevant experiential opportunities during their studies.<\u002Fp>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(255px,1fr));gap:20px\">\n          <sc-for list=\"{{ beyond }}\" as=\"b\" hint-placeholder-count=\"4\">\n            <div style=\"padding:30px 28px;border-radius:18px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.10)\">\n              <div style=\"width:44px;height:44px;border-radius:12px;background:{{ b.chip }};display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk';font-weight:700;color:#fff;font-size:19px;margin-bottom:18px\">{{ b.icon }}<\u002Fdiv>\n              <h3 style=\"margin:0 0 10px;font-family:'Space Grotesk';font-weight:600;font-size:18px;color:#fff\">{{ b.title }}<\u002Fh3>\n              <p style=\"margin:0;font-size:14px;line-height:1.6;color:#A8AFCC\">{{ b.body }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- SCHOLAR JOURNEY -->\n    <section style=\"padding:96px 5vw;background:#080C1E\">\n      <div style=\"max-width:1200px;margin:0 auto\">\n        <div style=\"font-size:12px;letter-spacing:2.5px;color:#22D3EE;margin-bottom:12px\">THE SCHOLAR JOURNEY<\u002Fdiv>\n        <h2 style=\"margin:0 0 40px;font-family:'Space Grotesk';font-weight:700;font-size:clamp(26px,3.8vw,42px);letter-spacing:-.7px;color:#fff;max-width:560px\">Your journey is yours — but you won't navigate it alone<\u002Fh2>\n        <div style=\"display:flex;flex-wrap:wrap;gap:10px;margin-bottom:30px\">\n          <sc-for list=\"{{ journeyTabs }}\" as=\"j\" hint-placeholder-count=\"4\">\n            <button sc-camel-on-click=\"{{ j.go }}\" style=\"{{ j.style }}\">{{ j.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"position:relative;height:4px;border-radius:2px;background:rgba(255,255,255,.08);margin-bottom:34px\">\n          <div style=\"position:absolute;top:0;left:0;height:100%;border-radius:2px;width:{{ journeyProgress }};background:var(--htx-grad,linear-gradient(135deg,#7C3AED,#22D3EE));transition:width .35s ease\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:38px 40px;border-radius:20px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.10)\">\n          <h3 style=\"margin:0 0 22px;font-family:'Space Grotesk';font-weight:700;font-size:25px;color:#fff\">{{ activeJourney.title }}<\u002Fh3>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px\">\n            <sc-for list=\"{{ activeJourney.items }}\" as=\"it\" hint-placeholder-count=\"4\">\n              <div style=\"display:flex;gap:12px;align-items:flex-start;font-size:15px;line-height:1.55;color:#D3D8EC\">\n                <span style=\"flex:none;width:22px;height:22px;border-radius:6px;background:rgba(124,58,237,.2);color:#C4B5FD;display:flex;align-items:center;justify-content:center;font-size:12px;margin-top:1px\">✓<\u002Fspan><span>{{ it }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- CLOSING -->\n    <section style=\"position:relative;overflow:hidden;padding:104px 5vw;text-align:center\">\n      <div style=\"position:absolute;inset:0;background:radial-gradient(80% 120% at 50% 0%,rgba(124,58,237,.24),transparent 60%),#060917\"><\u002Fdiv>\n      <div style=\"position:relative;max-width:820px;margin:0 auto\">\n        <h2 style=\"margin:0 0 20px;font-family:'Space Grotesk';font-weight:700;font-size:clamp(28px,4.2vw,48px);line-height:1.1;letter-spacing:-1px;color:#fff\">Your journey is yours. You won't have to navigate it alone.<\u002Fh2>\n        <p style=\"margin:0 0 36px;font-size:17px;line-height:1.6;color:#B4BAD6\">At every stage there will be people who challenge you, guide you and help you make sense of the choices ahead.<\u002Fp>\n        <button sc-camel-on-click=\"{{ goSchol }}\" style=\"display:inline-flex;align-items:center;gap:9px;padding:15px 30px;border-radius:999px;border:none;cursor:pointer;background:var(--htx-grad,linear-gradient(135deg,#7C3AED,#22D3EE));color:#fff;font-family:'Space Grotesk';font-weight:600;font-size:15.5px;box-shadow:0 12px 30px -10px rgba(124,58,237,.75)\">Hear from our scholars →<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n  <sc-if value=\"{{ isSchol }}\" hint-placeholder-val=\"{{ true }}\">\n  <div>\n    <!-- HEADLINE -->\n    <section style=\"position:relative;overflow:hidden;padding:110px 5vw 68px\">\n      <div style=\"position:absolute;inset:0;background:radial-gradient(100% 90% at 15% 0%,rgba(34,211,238,.16),transparent 55%),#060917\"><\u002Fdiv>\n      <div style=\"position:relative;max-width:1200px;margin:0 auto\">\n        <div style=\"font-size:12px;letter-spacing:2.5px;color:#22D3EE;margin-bottom:14px\">OUR SCHOLARS<\u002Fdiv>\n        <h1 style=\"margin:0 0 24px;font-family:'Space Grotesk';font-weight:700;font-size:clamp(36px,5.5vw,64px);line-height:1.04;letter-spacing:-1.3px;color:#fff;max-width:820px\">Different journeys.<br><span style=\"background:var(--htx-head,linear-gradient(120deg,#A78BFA,#22D3EE));-webkit-background-clip:text;background-clip:text;color:transparent\">One shared purpose.<\u002Fspan><\u002Fh1>\n        <p style=\"margin:0;font-size:18px;line-height:1.65;color:#B4BAD6;max-width:660px\">There's no single type of HTX scholar. They study different disciplines in different parts of the world — connected by a desire to use science and technology to make a meaningful contribution.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- FEATURED PROFILE -->\n    <section style=\"padding:20px 5vw 90px;background:#060917\">\n      <div style=\"max-width:1200px;margin:0 auto\">\n        <div style=\"display:grid;grid-template-columns:340px 1fr;gap:14px;margin-bottom:24px\">\n          <div style=\"display:flex;flex-direction:column;gap:10px\">\n            <sc-for list=\"{{ scholarTabs }}\" as=\"s\" hint-placeholder-count=\"4\">\n              <button sc-camel-on-click=\"{{ s.go }}\" style=\"{{ s.style }}\">\n                <span style=\"flex:none;width:46px;height:46px;border-radius:11px;overflow:hidden;background:#0B1030;display:block\"><\u002Fspan>\n                <span style=\"text-align:left;line-height:1.25\">\n                  <span style=\"display:block;font-family:'Space Grotesk';font-weight:700;font-size:15.5px;color:#fff\">{{ s.name }}<\u002Fspan>\n                  <span style=\"display:block;font-size:12.5px;color:#9AA3C4\">{{ s.discipline }}<\u002Fspan>\n                <\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"border-radius:22px;overflow:hidden;border:1px solid rgba(255,255,255,.10);background:linear-gradient(155deg,rgba(124,58,237,.12),rgba(34,211,238,.04))\">\n            <div style=\"display:grid;grid-template-columns:300px 1fr\">\n              <div style=\"position:relative;min-height:100%;background:#04060F\">\n                <image-slot id=\"scholar-photo\" shape=\"rect\" placeholder=\"Scholar portrait / reel\"><\u002Fimage-slot>\n                <div style=\"position:absolute;left:16px;top:16px;padding:6px 12px;border-radius:999px;background:rgba(6,9,23,.7);backdrop-filter:blur(6px);font-size:11px;letter-spacing:1px;color:#C4B5FD\">{{ activeScholar.category }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"padding:36px 38px\">\n                <h3 style=\"margin:0 0 4px;font-family:'Space Grotesk';font-weight:700;font-size:26px;color:#fff\">{{ activeScholar.name }}<\u002Fh3>\n                <div style=\"font-size:14px;color:#22D3EE;margin-bottom:24px\">{{ activeScholar.role }}<\u002Fdiv>\n                <div style=\"display:flex;flex-direction:column;gap:18px\">\n                  <sc-for list=\"{{ activeScholar.qa }}\" as=\"qa\" hint-placeholder-count=\"3\">\n                    <div>\n                      <div style=\"font-size:12.5px;color:#8B93B8;margin-bottom:5px;font-family:'Space Grotesk';font-weight:500\">{{ qa.q }}<\u002Fdiv>\n                      <div style=\"font-size:15px;line-height:1.55;color:#E3E6F3\">{{ qa.a }}<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"margin:0;font-size:12.5px;color:#5B6488;max-width:820px\">Profiles summarise publicly shared HTX scholar journeys. Portraits and reels are placeholders for approved scholar media.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ONE QUESTION ONE SCHOLAR -->\n    <section style=\"padding:88px 5vw;background:#080C1E\">\n      <div style=\"max-width:1200px;margin:0 auto\">\n        <div style=\"font-size:12px;letter-spacing:2.5px;color:#8B5CF6;margin-bottom:12px\">ONE QUESTION · ONE SCHOLAR<\u002Fdiv>\n        <h2 style=\"margin:0 0 40px;font-family:'Space Grotesk';font-weight:700;font-size:clamp(26px,3.8vw,42px);letter-spacing:-.7px;color:#fff;max-width:600px\">Short, honest answers — not scripted corporate interviews<\u002Fh2>\n        <div class=\"htx-scroll\" style=\"display:flex;gap:18px;overflow-x:auto;padding-bottom:14px;scroll-snap-type:x mandatory\">\n          <sc-for list=\"{{ reels }}\" as=\"r\" hint-placeholder-count=\"4\">\n            <div style=\"flex:none;width:230px;scroll-snap-align:start\">\n              <div style=\"position:relative;width:230px;height:340px;border-radius:18px;overflow:hidden;border:1px solid rgba(255,255,255,.10);background:#04060F\">\n                <sc-if value=\"{{ r.isSlot }}\" hint-placeholder-val=\"{{ true }}\">\n                  <image-slot id=\"{{ r.slot }}\" shape=\"rect\" placeholder=\"Vertical reel\"><\u002Fimage-slot>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ r.isThumb }}\" hint-placeholder-val=\"{{ false }}\">\n                  <button sc-camel-on-click=\"{{ r.play }}\" style=\"position:absolute;inset:0;border:none;cursor:pointer;padding:0;overflow:hidden;background:#04060F\">\n                    {{ r.thumbImg }}\n                  <\u002Fbutton>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ r.isPlaying }}\" hint-placeholder-val=\"{{ false }}\">\n                  <iframe src=\"{{ r.embed }}\" title=\"{{ r.q }}\" style=\"position:absolute;inset:0;width:100%;height:100%;border:0\" allow=\"autoplay; encrypted-media; picture-in-picture\" allowfullscreen=\"\"><\u002Fiframe>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ r.showChrome }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"position:absolute;inset:0;pointer-events:none\">\n                    <div style=\"position:absolute;inset:0;background:linear-gradient(0deg,rgba(6,9,23,.92),transparent 55%)\"><\u002Fdiv>\n                    <div style=\"position:absolute;left:16px;top:16px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.18);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px\">▶<\u002Fdiv>\n                    <div style=\"position:absolute;left:18px;right:18px;bottom:18px;font-family:'Space Grotesk';font-weight:600;font-size:16px;line-height:1.3;color:#fff\">{{ r.q }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- CONTENT WALL -->\n    <section style=\"padding:90px 5vw;background:#060917\">\n      <div style=\"max-width:1200px;margin:0 auto\">\n        <div style=\"display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:18px;margin-bottom:32px\">\n          <div>\n            <div style=\"font-size:12px;letter-spacing:2.5px;color:#22D3EE;margin-bottom:12px\">FROM THE COMMUNITY<\u002Fdiv>\n            <h2 style=\"margin:0;font-family:'Space Grotesk';font-weight:700;font-size:clamp(24px,3.4vw,36px);letter-spacing:-.6px;color:#fff\">Curated from HTX channels<\u002Fh2>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-wrap:wrap;gap:9px\">\n            <sc-for list=\"{{ wallTabs }}\" as=\"w\" hint-placeholder-count=\"4\">\n              <button sc-camel-on-click=\"{{ w.go }}\" style=\"{{ w.style }}\">{{ w.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px\">\n          <sc-for list=\"{{ wallCards }}\" as=\"c\" hint-placeholder-count=\"6\">\n            <div style=\"border-radius:16px;overflow:hidden;border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.03)\">\n              <div style=\"position:relative;height:180px;background:#04060F\">\n                <sc-if value=\"{{ c.isSlot }}\" hint-placeholder-val=\"{{ true }}\">\n                  <image-slot id=\"{{ c.slot }}\" shape=\"rect\" placeholder=\"Social post\"><\u002Fimage-slot>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ c.isThumb }}\" hint-placeholder-val=\"{{ false }}\">\n                  <button sc-camel-on-click=\"{{ c.play }}\" style=\"position:absolute;inset:0;border:none;cursor:pointer;padding:0;overflow:hidden;background:#04060F\">\n                    {{ c.thumbImg }}\n                    <span style=\"position:absolute;inset:0;background:linear-gradient(0deg,rgba(6,9,23,.5),transparent 62%)\"><\u002Fspan>\n                    <span style=\"position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:52px;height:52px;border-radius:50%;background:rgba(124,58,237,.92);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;box-shadow:0 8px 22px -6px rgba(124,58,237,.85)\">▶<\u002Fspan>\n                  <\u002Fbutton>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ c.isPlaying }}\" hint-placeholder-val=\"{{ false }}\">\n                  <iframe src=\"{{ c.embed }}\" title=\"{{ c.text }}\" style=\"position:absolute;inset:0;width:100%;height:100%;border:0\" allow=\"autoplay; encrypted-media; picture-in-picture\" allowfullscreen=\"\"><\u002Fiframe>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n              <div style=\"padding:16px 18px 18px\">\n                <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:8px\">\n                  <span style=\"padding:4px 10px;border-radius:999px;font-size:10.5px;letter-spacing:.5px;color:#fff;background:{{ c.chip }}\">{{ c.tag }}<\u002Fspan>\n                  <span style=\"font-size:11px;color:#5B6488\">{{ c.src }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"font-size:14px;line-height:1.5;color:#D3D8EC\">{{ c.text }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- CLOSING -->\n    <section style=\"position:relative;overflow:hidden;padding:100px 5vw;text-align:center\">\n      <div style=\"position:absolute;inset:0;background:radial-gradient(80% 120% at 50% 0%,rgba(124,58,237,.22),transparent 60%),#060917\"><\u002Fdiv>\n      <div style=\"position:relative;max-width:760px;margin:0 auto\">\n        <h2 style=\"margin:0 0 30px;font-family:'Space Grotesk';font-weight:700;font-size:clamp(28px,4.2vw,46px);line-height:1.1;letter-spacing:-1px;color:#fff\">Could your story be next?<\u002Fh2>\n        <button sc-camel-on-click=\"{{ goApply }}\" style=\"display:inline-flex;align-items:center;gap:9px;padding:15px 30px;border-radius:999px;border:none;cursor:pointer;background:var(--htx-grad,linear-gradient(135deg,#7C3AED,#22D3EE));color:#fff;font-family:'Space Grotesk';font-weight:600;font-size:15.5px;box-shadow:0 12px 30px -10px rgba(124,58,237,.75)\">Explore the scholarship →<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n  <sc-if value=\"{{ isApply }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"background:#F5F7FC;color:#0B1030\">\n    <!-- HEADLINE -->\n    <section style=\"position:relative;overflow:hidden;padding:104px 5vw 60px;background:linear-gradient(160deg,#0B1030,#1A1147)\">\n      <div aria-hidden=\"true\" style=\"position:absolute;display:var(--htx-x-display,block);right:-2vw;top:-60px;font-family:'Space Grotesk';font-weight:700;font-size:min(34vw,460px);line-height:.8;color:transparent;-webkit-text-stroke:1.5px rgba(255,255,255,.10);pointer-events:none\">X<\u002Fdiv>\n      <div style=\"position:relative;max-width:1100px;margin:0 auto\">\n        <div style=\"font-size:12px;letter-spacing:2.5px;color:#22D3EE;margin-bottom:14px\">SCHOLARSHIP &amp; APPLY<\u002Fdiv>\n        <h1 style=\"margin:0 0 22px;font-family:'Space Grotesk';font-weight:700;font-size:clamp(36px,5.5vw,60px);line-height:1.05;letter-spacing:-1.3px;color:#fff;max-width:720px\">Ready to begin your HTX journey?<\u002Fh1>\n        <p style=\"margin:0;font-size:17.5px;line-height:1.65;color:#C3C9E0;max-width:640px\">The HTX Scholarship supports talented students who are passionate about science and technology and want to contribute to Singapore's safety and security.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <div style=\"max-width:1100px;margin:0 auto;padding:64px 5vw 40px\">\n      <!-- WHAT IT SUPPORTS -->\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:44px;align-items:start;margin-bottom:72px\">\n        <div>\n          <h2 style=\"margin:0 0 20px;font-family:'Space Grotesk';font-weight:700;font-size:30px;letter-spacing:-.6px;color:#0B1030\">What the scholarship supports<\u002Fh2>\n          <div style=\"display:flex;flex-direction:column;gap:12px\">\n            <sc-for list=\"{{ supports }}\" as=\"s\" hint-placeholder-count=\"6\">\n              <div style=\"display:flex;gap:12px;align-items:flex-start;font-size:15.5px;line-height:1.5;color:#2A3358\">\n                <span style=\"flex:none;width:22px;height:22px;border-radius:6px;background:#7C3AED;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;margin-top:1px\">✓<\u002Fspan><span>{{ s }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:32px 34px;border-radius:18px;background:linear-gradient(150deg,#0B1030,#2A1B6B);color:#fff\">\n          <div style=\"font-family:'Space Grotesk';font-weight:700;font-size:44px;line-height:1;color:#22D3EE;margin-bottom:16px\">＋<\u002Fdiv>\n          <p style=\"margin:0;font-size:16.5px;line-height:1.6;color:#E3E6F3\">Financial support is only one part of the HTX scholar experience. Scholars are also supported by <strong style=\"color:#fff\">scholarship coaches, a mentor and a buddy<\u002Fstrong> throughout their journey.<\u002Fp>\n          <button sc-camel-on-click=\"{{ goExp }}\" style=\"margin-top:22px;background:none;border:none;cursor:pointer;padding:0;color:#22D3EE;font-family:'Space Grotesk';font-weight:600;font-size:14.5px\">See the Scholar Experience →<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ELIGIBILITY -->\n      <div style=\"margin-bottom:72px\">\n        <h2 style=\"margin:0 0 8px;font-family:'Space Grotesk';font-weight:700;font-size:30px;letter-spacing:-.6px;color:#0B1030\">Eligibility<\u002Fh2>\n        <p style=\"margin:0 0 24px;font-size:14px;color:#6B7399\">Indicative — full criteria are set out on the BrightSparks listing.<\u002Fp>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px\">\n          <sc-for list=\"{{ eligibility }}\" as=\"e\" hint-placeholder-count=\"4\">\n            <div style=\"display:flex;gap:12px;align-items:flex-start;padding:18px 20px;border-radius:14px;background:#fff;border:1px solid rgba(11,16,48,.08);font-size:15px;line-height:1.5;color:#2A3358\">\n              <span style=\"flex:none;width:22px;height:22px;border-radius:50%;background:rgba(124,58,237,.12);color:#7C3AED;display:flex;align-items:center;justify-content:center;font-size:12px;margin-top:1px\">✓<\u002Fspan><span>{{ e }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- AREAS OF STUDY -->\n      <div style=\"margin-bottom:72px\">\n        <h2 style=\"margin:0 0 24px;font-family:'Space Grotesk';font-weight:700;font-size:30px;letter-spacing:-.6px;color:#0B1030\">Areas of study<\u002Fh2>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px\">\n          <sc-for list=\"{{ areas }}\" as=\"a\" hint-placeholder-count=\"6\">\n            <div style=\"padding:22px 22px;border-radius:14px;background:#fff;border:1px solid rgba(11,16,48,.08)\">\n              <div style=\"width:38px;height:38px;border-radius:10px;background:{{ a.chip }};display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Space Grotesk';font-weight:700;font-size:16px;margin-bottom:14px\">{{ a.icon }}<\u002Fdiv>\n              <div style=\"font-family:'Space Grotesk';font-weight:600;font-size:16px;color:#0B1030\">{{ a.title }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- SERVICE COMMITMENT -->\n      <div style=\"margin-bottom:72px\">\n        <h2 style=\"margin:0 0 8px;font-family:'Space Grotesk';font-weight:700;font-size:30px;letter-spacing:-.6px;color:#0B1030\">Service commitment<\u002Fh2>\n        <p style=\"margin:0 0 24px;font-size:14px;color:#6B7399\">A bond period follows your studies, based on award type and where you study. The exact terms are confirmed in your scholarship offer.<\u002Fp>\n        <div style=\"border-radius:16px;overflow:hidden;border:1px solid rgba(11,16,48,.10)\">\n          <div style=\"display:grid;grid-template-columns:1.4fr 1fr 1fr;background:#0B1030;color:#fff;font-family:'Space Grotesk';font-weight:600;font-size:13.5px\">\n            <div style=\"padding:15px 22px\">Award type<\u002Fdiv>\n            <div style=\"padding:15px 22px\">Study location<\u002Fdiv>\n            <div style=\"padding:15px 22px\">Indicative bond<\u002Fdiv>\n          <\u002Fdiv>\n          <sc-for list=\"{{ bond }}\" as=\"b\" hint-placeholder-count=\"2\">\n            <div style=\"display:grid;grid-template-columns:1.4fr 1fr 1fr;background:#fff;border-top:1px solid rgba(11,16,48,.07);font-size:14.5px;color:#2A3358\">\n              <div style=\"padding:16px 22px;font-weight:600;color:#0B1030\">{{ b.type }}<\u002Fdiv>\n              <div style=\"padding:16px 22px\">{{ b.loc }}<\u002Fdiv>\n              <div style=\"padding:16px 22px\">{{ b.years }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- APPLICATION PROCESS -->\n      <div style=\"margin-bottom:72px\">\n        <h2 style=\"margin:0 0 30px;font-family:'Space Grotesk';font-weight:700;font-size:30px;letter-spacing:-.6px;color:#0B1030\">Application process<\u002Fh2>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:0\">\n          <sc-for list=\"{{ steps }}\" as=\"s\" hint-placeholder-count=\"4\">\n            <div style=\"padding-right:22px\">\n              <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:16px\">\n                <div style=\"flex:none;width:40px;height:40px;border-radius:11px;background:var(--htx-grad,linear-gradient(135deg,#7C3AED,#22D3EE));display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk';font-weight:700;color:#fff;font-size:16px\">{{ s.n }}<\u002Fdiv>\n                <div style=\"flex:1;height:2px;background:linear-gradient(90deg,rgba(124,58,237,.4),rgba(124,58,237,.05))\"><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-family:'Space Grotesk';font-weight:600;font-size:16.5px;color:#0B1030\">{{ s.title }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- FAQ -->\n      <div style=\"margin-bottom:40px\">\n        <h2 style=\"margin:0 0 24px;font-family:'Space Grotesk';font-weight:700;font-size:30px;letter-spacing:-.6px;color:#0B1030\">Frequently asked questions<\u002Fh2>\n        <div style=\"display:flex;flex-direction:column;gap:10px\">\n          <sc-for list=\"{{ faqs }}\" as=\"f\" hint-placeholder-count=\"6\">\n            <div style=\"border-radius:14px;background:#fff;border:1px solid rgba(11,16,48,.08);overflow:hidden\">\n              <button sc-camel-on-click=\"{{ f.toggle }}\" style=\"width:100%;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:20px 24px;background:none;border:none;cursor:pointer;text-align:left;font-family:'Space Grotesk';font-weight:600;font-size:16px;color:#0B1030\">\n                <span>{{ f.q }}<\u002Fspan>\n                <span style=\"flex:none;font-size:20px;color:#7C3AED;transform:{{ f.rot }};transition:transform .2s\">+<\u002Fspan>\n              <\u002Fbutton>\n              <sc-if value=\"{{ f.open }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"padding:0 24px 22px;font-size:15px;line-height:1.6;color:#4A5378\">{{ f.a }}<\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- APPLY CTA -->\n    <section style=\"position:relative;overflow:hidden;padding:96px 5vw;background:linear-gradient(160deg,#0B1030,#2A1B6B)\">\n      <div aria-hidden=\"true\" style=\"position:absolute;display:var(--htx-x-display,block);left:-2vw;bottom:-100px;font-family:'Space Grotesk';font-weight:700;font-size:min(34vw,460px);line-height:.8;color:transparent;-webkit-text-stroke:1.5px rgba(34,211,238,.12);pointer-events:none\">X<\u002Fdiv>\n      <div style=\"position:relative;max-width:900px;margin:0 auto;text-align:center\">\n        <h2 style=\"margin:0 0 30px;font-family:'Space Grotesk';font-weight:700;font-size:clamp(28px,4.2vw,46px);line-height:1.1;letter-spacing:-1px;color:#fff\">Solve for X. See it work in the real world.<\u002Fh2>\n        <div style=\"display:flex;flex-wrap:wrap;gap:14px;justify-content:center\">\n          <a href=\"#\" style=\"display:inline-flex;align-items:center;gap:9px;padding:16px 32px;border-radius:999px;background:var(--htx-grad,linear-gradient(135deg,#7C3AED,#22D3EE));color:#fff;font-family:'Space Grotesk';font-weight:600;font-size:16px;box-shadow:0 12px 30px -10px rgba(124,58,237,.75)\">Apply on BrightSparks →<\u002Fa>\n          <a href=\"#\" style=\"display:inline-flex;align-items:center;gap:9px;padding:16px 32px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.22);color:#fff;font-family:'Space Grotesk';font-weight:600;font-size:16px\">Contact the Scholarship Team<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <\u002Fdiv>\n\n  <footer style=\"border-top:1px solid rgba(255,255,255,.08);background:#04060F;padding:56px 5vw 40px\">\n    <div style=\"max-width:1200px;margin:0 auto;display:flex;flex-wrap:wrap;gap:40px;justify-content:space-between;align-items:flex-start\">\n      <div style=\"max-width:340px\">\n        <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:14px\">\n          <span style=\"display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:9px;background:var(--htx-grad,linear-gradient(135deg,#7C3AED,#22D3EE));font-family:'Space Grotesk';font-weight:700;font-size:18px;color:#fff\">X<\u002Fspan>\n          <span style=\"font-family:'Space Grotesk';font-weight:700;color:#fff;letter-spacing:.5px\">HTX BrightSparks<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:0;font-size:13.5px;line-height:1.6;color:#8B93B8\">Home Team Science &amp; Technology Agency. Where advanced STEM meets the frontline of Singapore's safety and security.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-wrap:wrap;gap:48px\">\n        <div>\n          <div style=\"font-size:11px;letter-spacing:2px;color:#5B6488;margin-bottom:14px\">EXPLORE<\u002Fdiv>\n          <sc-for list=\"{{ navItems }}\" as=\"item\" hint-placeholder-count=\"5\">\n            <button sc-camel-on-click=\"{{ item.go }}\" style=\"display:block;background:none;border:none;cursor:pointer;padding:5px 0;color:#C3C9E0;font-family:'IBM Plex Sans';font-size:14px;text-align:left\">{{ item.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:11px;letter-spacing:2px;color:#5B6488;margin-bottom:14px\">APPLY<\u002Fdiv>\n          <a href=\"#\" style=\"display:block;padding:5px 0;color:#C3C9E0;font-size:14px\">BrightSparks Portal<\u002Fa>\n          <a href=\"#\" style=\"display:block;padding:5px 0;color:#C3C9E0;font-size:14px\">Scholarship Team<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"max-width:1200px;margin:32px auto 0;padding-top:22px;border-top:1px solid rgba(255,255,255,.06);font-size:12px;color:#5B6488\">© 2026 HTX BrightSparks · Concept microsite<\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900},&quot;accent&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Electric&quot;,&quot;Ember&quot;,&quot;Signal&quot;],&quot;default&quot;:&quot;Electric&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Theme&quot;,&quot;label&quot;:&quot;Accent palette&quot;},&quot;xMotif&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Kinetic&quot;,&quot;Minimal&quot;,&quot;Off&quot;],&quot;default&quot;:&quot;Kinetic&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Theme&quot;,&quot;label&quot;:&quot;X motif motion&quot;},&quot;heroTone&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Mission&quot;,&quot;Curiosity&quot;],&quot;default&quot;:&quot;Mission&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Voice&quot;,&quot;label&quot;:&quot;Hero voice&quot;}}\">\nclass Component extends DCLogic {\n  state = { page: 'why', mission: 0, faq: -1, support: 0, journey: 0, story: 0, wall: 'all', playing: null };\n\n  go(p){ this.setState({ page: p }); if(typeof window!=='undefined') window.scrollTo({top:0,behavior:'smooth'}); }\n\n  palettes = {\n    Electric: { grad:'var(--htx-grad,linear-gradient(135deg,#7C3AED,#22D3EE))', head:'linear-gradient(120deg,#A78BFA,#22D3EE)' },\n    Ember:    { grad:'linear-gradient(135deg,#7C3AED,#EC4899)', head:'linear-gradient(120deg,#C4B5FD,#F472B6)' },\n    Signal:   { grad:'linear-gradient(135deg,#2563EB,#14B8A6)', head:'linear-gradient(120deg,#60A5FA,#2DD4BF)' },\n  };\n  applyTheme(){\n    if(typeof document==='undefined') return;\n    const p = this.palettes[this.props.accent] || this.palettes.Electric;\n    const r = document.documentElement.style;\n    r.setProperty('--htx-grad', p.grad);\n    r.setProperty('--htx-head', p.head);\n    const m = this.props.xMotif || 'Kinetic';\n    r.setProperty('--htx-x-display', m==='Off' ? 'none' : 'block');\n    r.setProperty('--htx-x-anim', m==='Kinetic' ? 'xdrift 14s ease-in-out infinite' : 'none');\n  }\n  componentDidMount(){ this.applyTheme(); }\n  componentDidUpdate(){ this.applyTheme(); }\n\n  navStyle(p){\n    const active = this.state.page === p;\n    return `padding:9px 15px;border-radius:9px;border:none;cursor:pointer;background:${active?'rgba(124,58,237,.16)':'transparent'};color:${active?'#fff':'#B4BAD6'};font-family:'Space Grotesk';font-weight:${active?600:500};font-size:14px;transition:all .15s`;\n  }\n\n  renderVals(){\n    const pages = [\n      { id:'why',   label:'Why HTX' },\n      { id:'work',  label:'Work & Careers' },\n      { id:'exp',   label:'Scholar Experience' },\n      { id:'schol', label:'Our Scholars' },\n      { id:'apply', label:'Scholarship & Apply' },\n    ];\n    const navItems = pages.map(p => ({\n      label: p.label,\n      style: this.navStyle(p.id),\n      go: () => this.go(p.id),\n    }));\n    const p = this.state.page;\n    const heroCopy = {\n      Mission: {\n        eyebrow:'SOLVE FOR X · SEE IT WORK IN THE REAL WORLD',\n        pre:'Turn what you study into what keeps ',\n        accent:'Singapore safe.',\n        sub:\"At HTX, science and technology don't stay in the classroom, lab or computer model. They become real solutions that help Home Team officers save lives, solve crimes, secure our borders and protect Singapore.\",\n      },\n      Curiosity: {\n        eyebrow:'CURIOUS MINDS · REAL-WORLD SCIENCE & TECH',\n        pre:'Follow your curiosity all the way to the ',\n        accent:'frontline.',\n        sub:'At HTX, the questions you love — how things work, and how to make them better — become the tools that help keep people safe. Explore widely, go deep, and see where your curiosity can lead.',\n      },\n    };\n    const hero = heroCopy[this.props.heroTone] || heroCopy.Mission;\n    const faqData = [\n      {q:'Can current undergraduates apply?', a:'Yes. Students already in university may apply, subject to the eligibility on the BrightSparks listing and remaining study duration.'},\n      {q:'Must I have secured a university place?', a:'You may apply before you have a confirmed place. Your offer can be made conditional on securing an approved course.'},\n      {q:'Can I apply before receiving my final results?', a:'Yes. You can apply ahead of your final results; the offer process accommodates results being confirmed later.'},\n      {q:'Can I study overseas?', a:'Yes, where the course is relevant and approved. Overseas scholars are supported throughout their time abroad.'},\n      {q:'How is my course approved?', a:'Courses are assessed for relevance to HTX\\u2019s capability needs. Your scholarship coaches help you navigate this.'},\n      {q:'Can I pursue an exchange programme?', a:'Scholars are encouraged and supported to broaden their perspective through exchange, subject to academic requirements and approval.'},\n      {q:'Will I have internship opportunities?', a:'Yes. Internships help you apply your learning and understand real operational and technical challenges at HTX.'},\n      {q:'How will my eventual HTX role be determined?', a:'Your role is discussed as you approach graduation, aligned to your background, strengths and HTX\\u2019s needs.'},\n      {q:'Can I pursue a Master\\u2019s degree?', a:'Master\\u2019s sponsorship is possible, subject to prevailing requirements and approval. Your mentor can advise on postgraduate choices.'},\n      {q:'What support will I receive while studying overseas?', a:'Your scholarship coaches, mentor and buddy stay connected with you before, during and after your studies — wherever you are.'},\n    ];\n    const reasons = [\n      { num:'01', icon:'◎', chip:'linear-gradient(135deg,#7C3AED,#A855F7)', title:'Work with purpose', body:'Apply your knowledge to public-safety problems where the outcome matters to officers, the public and Singapore.' },\n      { num:'02', icon:'⌘', chip:'linear-gradient(135deg,#6366F1,#22D3EE)', title:'Explore across disciplines', body:'See how AI, engineering, robotics, cyber, forensics, science and human factors come together to solve complex challenges.' },\n      { num:'03', icon:'◈', chip:'linear-gradient(135deg,#0EA5E9,#22D3EE)', title:'Learn through experience', body:'Broaden your perspective through internships, exchange programmes and exposure to real operational problems.' },\n      { num:'04', icon:'♥', chip:'linear-gradient(135deg,#8B5CF6,#EC4899)', title:'Be supported throughout', body:'Journey with scholarship coaches, a trusted mentor and a buddy — before, during and after your studies.' },\n    ];\n    const missions = [\n      { label:'Save lives', tag:'MISSION 01 · SAVE LIVES', title:'Help officers operate more safely', body:'Develop robotics, sensors, emergency-response technologies and human-performance solutions that help frontline officers act faster and safer.', fields:['Robotics','Mechanical Eng','Electrical Eng','Computer Eng','Human Factors'] },\n      { label:'Solve crimes', tag:'MISSION 02 · SOLVE CRIMES', title:'Uncover evidence, strengthen investigations', body:'Apply forensic science, data and artificial intelligence to reveal evidence and give investigators sharper, faster insight.', fields:['Chemistry','Biology','Forensic Science','Data Science','AI','Computer Science'] },\n      { label:'Secure borders', tag:'MISSION 03 · SECURE BORDERS', title:'Seamless, secure movement of people', body:'Use biometrics, screening systems, sensing technologies and data to support secure and seamless border operations.', fields:['Computer Vision','Electrical Eng','Systems Eng','Data Science','Psychology'] },\n      { label:'Safeguard systems', tag:'MISSION 04 · SAFEGUARD SYSTEMS', title:'Protect mission-critical digital systems', body:'Protect the digital systems the Home Team relies on, and build resilient platforms ready for the threats of tomorrow.', fields:['Cybersecurity','Computer Science','Cloud Eng','Software Eng','Information Systems'] },\n      { label:'Protect public spaces', tag:'MISSION 05 · PROTECT PUBLIC SPACES', title:'Safer spaces in a dense city', body:'Design safer infrastructure, surveillance systems, vehicles and technologies for a dense and complex urban environment.', fields:['Civil Eng','Architecture','Systems Eng','Electronics','Industrial Design'] },\n    ];\n    const mi = this.state.mission;\n    const missionTabs = missions.map((m,i)=>({\n      label: m.label,\n      go: () => this.setState({ mission:i }),\n      style: `padding:11px 18px;border-radius:999px;cursor:pointer;font-family:'Space Grotesk';font-weight:600;font-size:14px;transition:all .15s;border:1px solid ${i===mi?'transparent':'rgba(255,255,255,.16)'};background:${i===mi?'var(--htx-grad,linear-gradient(135deg,#7C3AED,#22D3EE))':'rgba(255,255,255,.03)'};color:${i===mi?'#fff':'#B4BAD6'}`,\n    }));\n    const pipeline = [\n      { n:'1', title:'Understand the problem', body:'Work with Home Team officers to understand the operational environment, risks and real needs.' },\n      { n:'2', title:'Explore possibilities', body:'Study emerging technologies, scientific evidence and approaches from Singapore and around the world.' },\n      { n:'3', title:'Build and test', body:'Develop prototypes, run experiments and test solutions in realistic environments.' },\n      { n:'4', title:'Put into operation', body:'Translate promising ideas into capabilities that are safe, reliable and ready for frontline use.' },\n    ];\n    const careers = [\n      { step:'DEEPEN', title:'Deepen your expertise', body:'Build specialist capabilities and advance the practices, methods and technologies in your field.' },\n      { step:'BUILD', title:'Build systems & solutions', body:'Bring disciplines together to translate operational needs into usable, deployable capabilities.' },\n      { step:'LEAD', title:'Lead programmes & missions', body:'Shape major projects, technology portfolios, partnerships and future capability directions.' },\n    ];\n    const support = [\n      { role:'Scholarship Coaches', value:'Guides the overall journey', head:'Guiding the overall journey', listLabel:'THEIR ROLE MAY INCLUDE', body:'A dedicated team supports you before, during and after your studies — helping you navigate the scholarship journey, stay connected with HTX and access the right support at each stage.', items:['Preparing you for your studies','Checking in on academic & personal progress','Connecting you to opportunities & resources','Supporting your transition from university to HTX','Helping you navigate scholarship matters'] },\n      { role:'Your Mentor', value:'Advises on academic & career choices', head:'A trusted adviser for important choices', listLabel:'A SOUNDING BOARD FOR', body:'An HTX mentor journeys with you and offers perspective on your development — an experienced professional who helps you think, not someone who decides for you.', items:['Academic & specialisation choices','Exchange programmes','Internship opportunities','Career interests & possible roles','Postgraduate or Master\\u2019s studies','Longer-term professional development'] },\n      { role:'Your Buddy', value:'Informal, relatable, personal', head:'A companion who understands the journey', listLabel:'YOUR BUDDY CAN HELP WITH', body:'Someone you can approach for informal advice, practical questions, or simply a conversation when you need one.', items:['Everyday questions about HTX or the scholarship','Adjusting to university or life overseas','Sharing practical experiences','Managing moments of uncertainty or stress','Connecting with the wider scholar community'] },\n    ];\n    const si = this.state.support;\n    const supportTabs = support.map((s,i)=>({\n      role:s.role, value:s.value,\n      go:()=>this.setState({support:i}),\n      style:`text-align:left;padding:18px 20px;border-radius:14px;cursor:pointer;transition:all .15s;border:1px solid ${i===si?'transparent':'rgba(255,255,255,.12)'};background:${i===si?'var(--htx-grad,linear-gradient(135deg,#7C3AED,#22D3EE))':'rgba(255,255,255,.03)'};color:#fff`,\n    }));\n    const beyond = [\n      { icon:'✈', chip:'linear-gradient(135deg,#7C3AED,#A855F7)', title:'Exchange programmes', body:'Experience a different academic environment, encounter new perspectives and develop independence and adaptability.' },\n      { icon:'◈', chip:'linear-gradient(135deg,#6366F1,#22D3EE)', title:'Internships', body:'Apply what you\\u2019ve learnt, meet real operational challenges and see how multidisciplinary teams solve problems.' },\n      { icon:'◎', chip:'linear-gradient(135deg,#0EA5E9,#22D3EE)', title:'Exposure to HTX & the Home Team', body:'Stay connected to HTX\\u2019s missions, technologies and people so your learning stays rooted in real needs.' },\n      { icon:'▲', chip:'linear-gradient(135deg,#8B5CF6,#EC4899)', title:'Professional development', body:'Build the confidence, judgement and ability to work with others that will matter throughout your career.' },\n    ];\n    const journey = [\n      { label:'Before your studies', title:'Before your studies', items:['Prepare for university and, where relevant, living overseas','Meet your coaches, mentor, buddy and fellow scholars','Begin understanding HTX\\u2019s mission and career areas','Discuss your academic plans and aspirations'] },\n      { label:'During your studies', title:'During your studies', items:['Receive regular guidance and check-ins','Discuss academic, exchange and internship choices','Explore opportunities beyond formal coursework','Stay connected with HTX\\u2019s work and scholar community','Reflect on how your interests are developing'] },\n      { label:'Approaching graduation', title:'Approaching graduation', items:['Discuss career interests and areas of contribution','Prepare for the transition from university to workplace','Understand how your experiences translate into HTX roles','Consider further development, including postgraduate study'] },\n      { label:'When you join HTX', title:'When you join HTX', items:['Begin applying your knowledge to real public-safety challenges','Build professional depth within your domain','Learn from specialists and multidisciplinary teams','Keep developing through projects, exposure and career conversations'] },\n    ];\n    const ji = this.state.journey;\n    const journeyTabs = journey.map((j,i)=>({\n      label:j.label,\n      go:()=>this.setState({journey:i}),\n      style:`padding:11px 18px;border-radius:999px;cursor:pointer;font-family:'Space Grotesk';font-weight:600;font-size:14px;transition:all .15s;border:1px solid ${i===ji?'transparent':'rgba(255,255,255,.16)'};background:${i===ji?'var(--htx-grad,linear-gradient(135deg,#7C3AED,#22D3EE))':'rgba(255,255,255,.03)'};color:${i===ji?'#fff':'#B4BAD6'}`,\n    }));\n    const scholars = [\n      { name:'Jaren Chua', discipline:'Computer Engineering', category:'FINDING MY PLACE', role:'HTX Scholar · Computer Engineering, University of Illinois Urbana-Champaign', qa:[\n        {q:'What first attracted you to HTX?', a:'The chance to work at the intersection of robotics, sensing and AI on problems with real operational stakes — I first came across the scholarship through a careers portal and HTX\\u2019s social channels.'},\n        {q:'What did you study, and why?', a:'Computer engineering — it lets me build across hardware and software, from sensors to sense-making.'},\n        {q:'What public-safety challenge would you like to help solve?', a:'Making immigration clearance faster and more seamless — ultimately, secure passport-less travel.'},\n      ]},\n      { name:'Ng Jian Yan', discipline:'Human Factors Science', category:'SEEING THE WORLD DIFFERENTLY', role:'Human Performance, Interaction & Teaming Scientist · MPhil Technology Policy, University of Cambridge', qa:[\n        {q:'Which experience broadened your perspective most?', a:'An internship developing image-dehazing models for maritime surveillance, plus the Home Team Scholars\\u2019 Vacation Programme — theory suddenly had an operational edge.'},\n        {q:'What did you study, and why?', a:'I moved toward technology policy to understand how science translates into decisions people can trust.'},\n        {q:'When did HTX\\u2019s mission become real to you?', a:'Seeing a model I helped build sharpen what a Coast Guard officer could actually see at sea.'},\n      ]},\n      { name:'Muadz Yamani', discipline:'Engineering', category:'CLASSROOM TO REAL-WORLD', role:'HTX Local Merit Scholar · internship with Robotics, Automation & Unmanned Systems', qa:[\n        {q:'What did your internship teach you that university could not?', a:'Working on an SCDF motorised stretcher showed me how much a design decision matters when a paramedic is the end user.'},\n        {q:'What first attracted you to HTX?', a:'Engineering that officers depend on in the moments that count.'},\n        {q:'What public-safety challenge would you like to help solve?', a:'Reducing the physical load on frontline responders through better robotics.'},\n      ]},\n      { name:'Cheryl Kwek', discipline:'Computer Science', category:'CLASSROOM TO REAL-WORLD', role:'HTX Scholar · Computer Science, Singapore University of Technology & Design', qa:[\n        {q:'What did you study, and why?', a:'Computer science with a robotics focus — a passion I\\u2019ve chased since leading my school\\u2019s robotics club.'},\n        {q:'What first attracted you to HTX?', a:'Robotics applied to keeping people safe, not just to competitions and labs.'},\n        {q:'What public-safety challenge would you like to help solve?', a:'Autonomous systems that can go where it\\u2019s too dangerous for officers.'},\n      ]},\n    ];\n    const sti = this.state.story;\n    const scholarTabs = scholars.map((s,i)=>({\n      name:s.name, discipline:s.discipline,\n      go:()=>this.setState({story:i}),\n      style:`display:flex;align-items:center;gap:14px;padding:12px 14px;border-radius:14px;cursor:pointer;transition:all .15s;border:1px solid ${i===sti?'transparent':'rgba(255,255,255,.10)'};background:${i===sti?'linear-gradient(135deg,rgba(124,58,237,.35),rgba(34,211,238,.15))':'rgba(255,255,255,.03)'}`,\n    }));\n    const play = this.state.playing;\n    const yt = id => ({ thumb:`https://img.youtube.com/vi/${id}/hqdefault.jpg`, embed:`https://www.youtube.com/embed/${id}?autoplay=1&rel=0` });\n    const mkV = (c, pid) => {\n      const has = !!c.video; const m = has ? yt(c.video) : {};\n      const thumbImg = has ? React.createElement('img',{src:m.thumb, alt:'', style:{width:'100%',height:'100%',objectFit:'cover',display:'block'}}) : null;\n      return { ...c, slot: c.slot||pid, isSlot:!has, isThumb:has&&play!==pid, isPlaying:has&&play===pid,\n        showChrome: !(has&&play===pid), thumb:m.thumb||'', embed:m.embed||'', thumbImg,\n        play: () => this.setState({playing: pid}) };\n    };\n    const reelData = [\n      { slot:'reel1', q:'What did your mentor help you see differently?' },\n      { slot:'reel2', q:'What did your internship teach you that uni couldn\\u2019t?' },\n      { slot:'reel3', q:'When did HTX\\u2019s mission become real to you?' },\n      { slot:'reel4', q:'What are you hoping to build when you return?' },\n      { slot:'reel5', q:'What would you tell a new HTX scholar?' },\n    ];\n    const reels = reelData.map((r,i)=>mkV(r, 'reel-'+(r.video||i)));\n    const heroVideo = mkV({ video:'Tza1qAg2Vho' }, 'hero-film');\n    const allWall = [\n      { cat:'people', video:'Tza1qAg2Vho', tag:'People of HTX', chip:'#EC4899', src:'YouTube', text:'What is HTX? The science & technology arm of the Home Team.' },\n      { cat:'tech', slot:'w2', tag:'Technology in Action', chip:'#0EA5E9', src:'Drop in', text:'Add an HTX tech-in-action clip (robotics, drones, forensics).' },\n      { cat:'people', slot:'w3', tag:'People of HTX', chip:'#EC4899', src:'Drop in', text:'Add an HTX engineer , with a strong academic record','Keen to contribute to Singapore\\u2019s safety and security through public service','Singapore Citizen (or as specified on the BrightSparks listing)','Applying to, or enrolled in, a relevant course approved by HTX'],\n      areas: [\n        {icon:'AI', chip:'linear-gradient(135deg,#7C3AED,#A855F7)', title:'Computing, AI & data'},\n        {icon:'⚙', chip:'linear-gradient(135deg,#6366F1,#22D3EE)', title:'Engineering & robotics'},\n        {icon:'⛨', chip:'linear-gradient(135deg,#0EA5E9,#22D3EE)', title:'Cybersecurity & digital systems'},\n        {icon:'⚛', chip:'linear-gradient(135deg,#8B5CF6,#EC4899)', title:'Physical & life sciences'},\n        {icon:'⌕', chip:'linear-gradient(135deg,#F59E0B,#EC4899)', title:'Forensics & human sciences'},\n        {icon:'✕', chip:'var(--htx-grad,linear-gradient(135deg,#7C3AED,#22D3EE))', title:'Other disciplines relevant to HTX'},\n      ],\n      bond: [\n        {type:'HTX Scholarship', loc:'Local university', years:'4 years'},\n        {type:'HTX Scholarship', loc:'Overseas (English-speaking)', years:'6 years'},\n        {type:'HTX Scholarship', loc:'Overseas (non-English-speaking)', years:'5 years'},\n      ],\n      steps: [\n        {n:'1', title:'Submit application'},\n        {n:'2', title:'Application review'},\n        {n:'3', title:'Assessments & interviews'},\n        {n:'4', title:'Scholarship offer'},\n      ],\n      faqs: faqData.map((f,i)=>({\n        q:f.q, a:f.a,\n        open: this.state.faq===i,\n        rot: this.state.faq===i ? 'rotate(45deg)' : 'rotate(0deg)',\n        toggle: () => this.setState(st=>({faq: st.faq===i?-1:i})),\n      })),\n      goHome: () => this.go('why'),\n      goApply: () => this.go('apply'),\n      goWork: () => this.go('work'),\n      goExp: () => this.go('exp'),\n      goSchol: () => this.go('schol'),\n      isWhy: p==='why', isWork: p==='work', isExp: p==='exp', isSchol: p==='schol', isApply: p==='apply',\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
